openapi: 3.1.0
info:
  title: 默认模块
  description: ''
  version: 1.0.0
tags: []
paths: {}
webhooks: {}
components:
  schemas:
    dd:
      type: object
      properties:
        CompMode:
          type: string
          default: NormalMesh
        FlowType:
          type: string
          default: Instaneous
        PathNameCalData:
          type: string
          default: ./CAL_DATA
          description: 计算结果输出路径
        PathNameCalInfo:
          type: string
          default: ./CAL_INFO
          description: 计算日志输出路径
        PathNameLoadModel:
          type: string
          default: ./Ply
          description: 模型路径
        PathNameMesh:
          type: string
          default: ./MESH_DATA/Flow_Mesh
          description: 计算加载网格文件路径
        SteadyMethod:
          type: string
          default: SteadyByRho
        SteadyTol:
          type: number
          format: double
          default: 5.e-12
      required:
        - CompMode
        - FlowType
        - PathNameCalData
        - PathNameCalInfo
        - PathNameLoadModel
        - PathNameMesh
        - SteadyMethod
        - SteadyTol
      x-apifox-orders:
        - CompMode
        - FlowType
        - PathNameCalData
        - PathNameCalInfo
        - PathNameLoadModel
        - PathNameMesh
        - SteadyMethod
        - SteadyTol
      description: 基本设置参数
      x-apifox-ignore-properties: []
      x-apifox-folder: dklhfjk
    test:
      type: object
      properties:
        Advance:
          type: object
          properties:
            FlagIsoZoneCheck:
              type: string
              title: 孤立区域检查
              description: 开启后可以输出孤立区域ID的DAG文件，检查铸件区域是否完全联通
              default: 'OFF'
            FlagSharedMemory:
              type: string
              title: 共享内存开关
              description: 开启后可以降低内存消耗
              default: 'OFF'
          required:
            - FlagIsoZoneCheck
            - FlagSharedMemory
          x-apifox-orders:
            - FlagIsoZoneCheck
            - FlagSharedMemory
          x-apifox-ignore-properties: []
      required:
        - Advance
      x-apifox-orders:
        - Advance
      x-apifox-ignore-properties: []
      x-apifox-folder: ''
  responses: {}
  securitySchemes: {}
servers: []
security: []
